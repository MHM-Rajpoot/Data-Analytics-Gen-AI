<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Quant Finance Portfolio Risk Analysis dashboard mockup'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#f8f7f2'/>
      <stop offset='55%' stop-color='#eef2f4'/>
      <stop offset='100%' stop-color='#f9efe7'/>
    </linearGradient>
    <linearGradient id='hero' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#608090'/>
      <stop offset='55%' stop-color='#A0B0C0'/>
      <stop offset='100%' stop-color='#404050'/>
    </linearGradient>
    <pattern id='grid' width='36' height='36' patternUnits='userSpaceOnUse'>
      <path d='M 36 0 L 0 0 0 36' fill='none' stroke='rgba(16,16,16,0.04)' stroke-width='1'/>
    </pattern>
    <filter id='softShadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='10' stdDeviation='18' flood-color='rgba(16,16,16,0.12)'/>
    </filter>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>
