      <stop offset='100%' stop-color='#608090'/>
    </linearGradient>
    <pattern id='grid' width='36' height='36' patternUnits='userSpaceOnUse'>
      <path d='M 36 0 L 0 0 0 36' fill='none' stroke='rgba(16,16,16,0.04)' stroke-width='1'/>
    </pattern>
    <filter id='softShadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='10' stdDeviation='18' flood-color='rgba(16,16,16,0.12)'/>
    </filter>
  </defs>
