<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Coffee Shop Sales Dashboard dashboard mockup'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#f8f7f2'/>
      <stop offset='55%' stop-color='#eef2f4'/>
      <stop offset='100%' stop-color='#f9efe7'/>
    </linearGradient>
    <linearGradient id='hero' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#C98A28'/>
