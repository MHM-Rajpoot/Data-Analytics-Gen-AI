    </pattern>
    <filter id='softShadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='10' stdDeviation='18' flood-color='rgba(16,16,16,0.12)'/>
    </filter>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>
